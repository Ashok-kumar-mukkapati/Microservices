spring.application.name=product-service
server.port=8081

spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=product_db;encrypt=true;trustServerCertificate=true
spring.datasource.username=ASHOK
spring.datasource.password=Ash@0708
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect

spring.kafka.bootstrap-servers=localhost:19092
spring.kafka.consumer.group-id=product-service-group-v2
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=true
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

logging.level.Product.product_service.service.KafkaConsumerService=INFO

